<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Style Index</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #262626;
            --border-color: #dbdbdb;
            --accent-blue: #0095f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 935px;
            width: 100%;
            padding: 30px 20px;
        }

        /* Cabecera del Perfil */
        header {
            display: flex;
            align-items: center;
            margin-bottom: 44px;
        }

       .profile-pic {
          width: 150px;
          height: 150px; 
          background-color: #efefef;
          background-image: url('image_71c6be.png.webp');
          background-size: cover;
          background-position: center;
          border-radius: 50%;
          margin-right: 80px;
          border: 1px solid var(--border-color);
       }

        .profile-info h2 {
            font-size: 28px;
            font-weight: 300;
            display: inline-block;
            margin: 0 20px 0 0;
        }

        .stats {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .stats li {
            margin-right: 40px;
            font-size: 16px;
        }

        .stats b { font-weight: 600; }

        .bio b { display: block; margin-bottom: 5px; }

        /* Grid de Contenido (Feed Estilo Instagram) */
    .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 3 columnas iguales */
        gap: 3px; /* Espaciado fino entre fotos */
        border-top: 1px solid var(--border-color);
        padding-top: 20px;
        width: 100%;
    }

    .grid-item {
        position: relative;
        background-color: #fafafa;
        aspect-ratio: 1 / 1; /* Cuadrado perfecto */
        width: 100%;
        cursor: pointer;
        overflow: hidden;
        display: block;
    }

    .grid-item img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Evita que la imagen se deforme */
        transition: opacity 0.2s;
    }

    .grid-item:hover img {
        opacity: 0.8;
    }

    .grid-item .overlay {
        position: absolute;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        width: 100%;
        font-size: 10px;
        padding: 5px;
        text-align: center;
    }

    @media (max-width: 735px) {
        .profile-pic { width: 80px; height: 80px; margin-right: 30px; }
        .grid { gap: 3px; }
    }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="profile-pic">
                <img src="image_71c6be.png.webp" alt="Perfil">
            </div>
            <section class="profile-info">
                <h2>Mr.Músculo</h2>
                <button style="padding: 5px 9px; font-weight: 600;">Editar perfil</button>
                
                <ul class="stats">
                    <li><b>102</b> publicaciones</li>
                    <li><b>7,514</b> seguidores</li>
                    <li><b>187</b> seguidos</li>
                </ul>

                <div class="bio">
                    <b>Álvaro Mr. Músculo</b>
                    <span>"Limpia menos, vive más"</span>
                </div>
            </section>
        </header>

        <main class="grid">
            <a href="generalidadesinmune.html" class="grid-item">
                <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&w=500&q=80" alt="Generalidades">
                <div class="overlay">Generalidades</div>
            </a>

            <a href="inmunidadinnata.html" class="grid-item">
                <img src="https://images.unsplash.com/photo-1579154213828-48198282c939?auto=format&fit=crop&w=500&q=80" alt="Inmunidad Innata">
                <div class="overlay">Inmunidad Innata</div>
            </a>

            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
            <div class="grid-item"></div>
        </main>
    </div>

</body>
</html>
