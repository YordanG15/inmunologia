<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Style Index</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #262626;
            --border-color: #dbdbdb;
            --accent-blue: #0095f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 935px;
            width: 100%;
            padding: 30px 20px;
        }

        /* Cabecera del Perfil */
        header {
            display: flex;
            align-items: center;
            margin-bottom: 44px;
        }

       .profile-pic {
          width: 150px;
          height: 150px; 
          background-color: #efefef;
          background-image: url('image_71bb9d.jpg');
          background-size: cover;
          background-position: center;
          border-radius: 50%;
          margin-right: 80px;
          border: 1px solid var(--border-color);
       }

        .profile-info h2 {
            font-size: 28px;
            font-weight: 300;
            display: inline-block;
            margin: 0 20px 0 0;
        }

        .stats {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .stats li {
            margin-right: 40px;
            font-size: 16px;
        }

        .stats b { font-weight: 600; }

        .bio b { display: block; margin-bottom: 5px; }

        /* Grid de Contenido (Feed) */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            border-top: 1px solid var(--border-color);
            padding-top: 50px;
        }

        .grid-item {
            background-color: #efefef;
            aspect-ratio: 1 / 1;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .grid-item:hover { opacity: 0.8; }

        @media (max-width: 735px) {
            .profile-pic { width: 80px; height: 80px; margin-right: 30px; }
            .grid { gap: 3px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="profile-pic"></div>
        <section class="profile-info">
            <h2>Mr.Músculo</h2>
            <button style="padding: 5px 9px; font-weight: 600;">Editar perfil</button>
            
            <ul class="stats">
                <li><b>102</b> publicaciones</li>
                <li><b>7,514</b> seguidores</li>
                <li><b>187</b> seguidos</li>
            </ul>

            <div class="bio">
                <b>Álvaro Mr. Músculo</b>
                <span>"Limpia menos, vive más"</span>
            </div>
        </section>
    </header>

    <main class="grid">
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
        <div class="grid-item"></div>
    </main>
</div>

</body>
</html>
